<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>清理扫描报告</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1020;color:#e8eefc;margin:0;padding:24px;}
    .wrap{max-width:1100px;margin:0 auto;}
    .hero{background:linear-gradient(135deg,#16203a,#0f172a);border:1px solid #24314f;border-radius:20px;padding:24px;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0;}
    .card{background:#111827;border:1px solid #24314f;border-radius:16px;padding:14px;margin:10px 0;}
    summary{cursor:pointer;font-weight:700;display:flex;justify-content:space-between;gap:12px;}
    summary span{color:#9fb3d9;font-weight:600;}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#1f2937;margin-right:8px;}
    .green{background:#0f5132;}
    .yellow{background:#6b4e00;}
    .red{background:#6b1d1d;}
    code{background:#0b1220;padding:2px 6px;border-radius:6px;}
    ul{padding-left:20px;}
    .empty{opacity:.7}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>清理扫描报告</h1>
    <p>系统：{{SYSTEM_OS}} | 用户：{{SYSTEM_USER}} | 主盘：{{SYSTEM_DRIVE}}</p>
    <div class="grid">
      <div class="pill green">绿灯 {{GREEN_SIZE}}</div>
      <div class="pill yellow">黄灯 {{YELLOW_SIZE}}</div>
      <div class="pill red">红灯 {{RED_SIZE}}</div>
    </div>
    <p>最大占用项：{{TOP1_NAME}}。</p>
  </div>
  <section>
    <h2>Top 5 占用项</h2>
    <ul>{{TOP5_HTML}}</ul>
  </section>
  <section>
    <h2>绿灯：可直接清理</h2>
    {{GREEN_ITEMS}}
  </section>
  <section>
    <h2>黄灯：建议先确认</h2>
    {{YELLOW_ITEMS}}
  </section>
  <section>
    <h2>红灯：谨慎清理</h2>
    {{RED_ITEMS}}
  </section>
</div>
</body>
</html>
